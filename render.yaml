# Render Blueprint — API Backend (PHP + PostgreSQL)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: aw-pitahaya-api
    runtime: docker
    repo: https://github.com/jeffersoncodes-ops/aw-pitahaya
    rootDir: api
    dockerfilePath: Dockerfile
    healthCheckPath: /stats.php
    envVars:
      - key: APP_ENV
        value: production
      - key: DB_HOST
        sync: false      # set in dashboard (Neon host)
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: neondb
      - key: DB_SSLMODE
        value: require
      - key: DB_USER
        sync: false      # set in dashboard
      - key: DB_PASSWORD
        sync: false      # set in dashboard
      - key: JWT_SECRET
        generateValue: true
